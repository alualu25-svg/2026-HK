<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026港澳吃喝團之小馬哥首航</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/vue@3"></script>

<link rel="manifest" href="manifest.json">

<style>
body{margin:0;font-family:sans-serif;background:#0b1220;color:white}
.card{margin:12px;padding:14px;background:#1e293b;border-radius:16px}
nav{position:sticky;top:0;background:#0b1220;display:flex;justify-content:space-around;padding:10px;border-bottom:1px solid #333}
button{padding:8px 12px;border-radius:10px;background:#2563eb;color:white}
</style>
</head>

<body>
<div id="app">

<nav>
<button @click="tab='plan'">行程</button>
<button @click="tab='weather'">天氣</button>
<button @click="tab='info'">資訊</button>
<button @click="tab='bag'">行李</button>
</nav>

<!-- 行程 -->
<div v-if="tab==='plan'">
<div class="card" v-for="p in plans">
<h3 class="text-lg font-bold">{{p.name}}</h3>
<p class="text-sm">{{p.desc}}</p>
<p class="text-xs text-gray-300">交通：{{p.route}}</p>
<button @click="go(p)">📍導航</button>
</div>
</div>

<!-- 天氣 -->
<div v-if="tab==='weather'" class="card">
香港：{{weather.hk}}°C<br>
澳門：{{weather.mo}}°C
</div>

<!-- 資訊 -->
<div v-if="tab==='info'" class="card">
<h3>住宿</h3>
<p>📍旭逸酒店 荃灣</p>
<p>📍利澳酒店 澳門</p>
</div>

<!-- 行李 -->
<div v-if="tab==='bag'" class="card">
<div v-for="b in bag">
<input type="checkbox"> {{b}}
</div>
</div>

</div>

<script>
const {createApp,ref,onMounted}=Vue;

createApp({
setup(){

const tab=ref('plan');

const plans=ref([
{name:'大三巴',lat:22.197,lng:113.541,desc:'澳門地標',route:'步行約10分鐘直走上坡'},
{name:'禮記雪糕',lat:22.195,lng:113.542,desc:'超人氣雪糕',route:'下坡右轉直走'}
]);

const weather=ref({hk:'--',mo:'--'});

const bag=ref(['護照','現金','充電器','行動電源','八達通']);

function go(p){
if(/iPhone|iPad/.test(navigator.userAgent)){
window.location.href=`http://maps.apple.com/?daddr=${p.lat},${p.lng}`;
}else{
window.open(`https://www.google.com/maps/search/?api=1&query=${p.lat},${p.lng}`);
}
}

onMounted(()=>{
fetch('https://api.open-meteo.com/v1/forecast?latitude=22.3&longitude=114.2&current_weather=true')
.then(r=>r.json())
.then(d=>{
weather.value.hk=d.current_weather.temperature;
});

fetch('https://api.open-meteo.com/v1/forecast?latitude=22.2&longitude=113.5&current_weather=true')
.then(r=>r.json())
.then(d=>{
weather.value.mo=d.current_weather.temperature;
});
});

return{tab,plans,weather,bag,go}
}
}).mount('#app');
</script>

<script>
if('serviceWorker' in navigator){
navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
